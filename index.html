<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Makeup Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    
    <h1>✨ Makeup Store ✨</h1>
    <p>Belleza, estilo y confianza en un solo lugar 💕</p>
</header>

    <p>Productos de maquillaje para resaltar tu belleza ✨</p>
</header>

<nav>
    <button onclick="mostrarCarrito()">🛒 Carrito (<span id="contador">0</span>)</button>
</nav>

<section class="productos">

<div class="producto">
    <img src="https://via.placeholder.com/250" alt="Labial">
    <h2>Labial Mate</h2>
    <p>$8.99</p>
    <button onclick="agregarProducto('Labial Mate',8.99)">
        Agregar al carrito
    </button>
</div>


<div class="producto">
    <img src="https://via.placeholder.com/250" alt="Base">
    <h2>Base Líquida</h2>
    <p>$14.99</p>
    <button onclick="agregarProducto('Base Líquida',14.99)">
        Agregar al carrito
    </button>
</div>


<div class="producto">
    <img src="https://via.placeholder.com/250" alt="Sombras">
    <h2>Paleta de Sombras</h2>
    <p>$18.99</p>
    <button onclick="agregarProducto('Paleta de Sombras',18.99)">
        Agregar al carrito
    </button>
</div>

</section>


<div id="carrito" class="carrito">

<h2>🛒 Tu pedido</h2>

<div id="lista-carrito"></div>

<h3>Total: $<span id="total">0.00</span></h3>

<button onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp 💬
</button>

<button onclick="cerrarCarrito()">
Cerrar
</button>

</div>


<footer>
©️ Makeup Store
</footer>


<script src="script.js"></script>

</body>
</html>
