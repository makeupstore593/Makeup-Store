<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Makeup Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    
    <h1>✨ Makeup Store ✨</h1>
    <p>Belleza, estilo y confianza en un solo lugar 💕</p>
    
    <p>Productos de maquillaje para resaltar tu belleza ✨</p>
</header>

<nav>
    <button onclick="mostrarCarrito()">🛒 Carrito (<span id="contador">0</span>)</button>
</nav>

<section class="productos" id="productos">
</section>


<div id="carrito" class="carrito">

<h2>🛒 Tu pedido</h2>

<div id="lista-carrito"></div>

<h3>Total: $<span id="total">0.00</span></h3>

<button onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp 💬
</button>

<button onclick="cerrarCarrito()">
Cerrar
</button>

</div>


<footer>
©️ Makeup Store
</footer>


<script type="module" src="script.js"></script>

</body>
</html>
